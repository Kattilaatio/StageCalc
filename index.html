<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STAGE CALC</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stage Calc">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/180">

  <style>
    /* Default Light Mode Variables */
    :root {
      --bg-color: #f5f5f5;
      --container-bg: #fff;
      --text-color: #333;
      --input-bg: #fff;
      --input-border: #ccc;
      --history-bg: #eee;
      --result-color: #2c3e50;
      --subtext-color: #555;
    }

    /* Dark Mode Variables */
    body.dark-mode {
      --bg-color: #121212;
      --container-bg: #1e1e1e;
      --text-color: #e0e0e0;
      --input-bg: #2c2c2c;
      --input-border: #444;
      --history-bg: #2c2c2c;
      --result-color: #e0e0e0;
      --subtext-color: #aaa;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      user-select: none; 
      -webkit-user-select: none;
      transition: background-color 0.3s ease;
    }

    .container {
      width: 90vw;
      margin: 15px auto;
      padding: 15px;
      text-align: center;
      border-radius: 10px;
      background-color: var(--container-bg);
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
      box-sizing: border-box;
      transition: background-color 0.3s ease;
    }

    input[type="number"], input[type="tel"], input[type="text"] {
      width: 80px;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: 18px;
      text-align: center;
    }

    /* NEW: Flex row for Stage Name and Theme Button */
    .header-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      align-items: center;
    }

    #stage-name {
      flex-grow: 1; /* Takes up all remaining width */
      box-sizing: border-box;
      text-align: center;
      margin-bottom: 0; /* Reset margin since it's in the flex row now */
    }

    button {
      width: 50px;
      padding: 14px;
      border-radius: 6px;
      border: none;
      background-color: #3498db;
      color: white;
      font-size: 18px;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      background-color: #2980b9;
      transform: scale(0.95);
    }

    .theme-btn {
      background-color: #555;
      flex-shrink: 0; /* Prevents the button from being squished */
      padding: 12px 0; /* Adjust padding to perfectly center the icon */
    }

    #result {
      margin-top: 10px;
      font-size: 22px;
      font-weight: bold;
      color: var(--result-color);
      min-height: 50px;
    }

    #status-message {
      font-weight: bold;
      margin-top: 10px;
      min-height: 20px;
    }

    .boxHit {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    label {
      font-weight: bold;
      flex-grow: 1;
      text-align: left;
    }

    .btnWide {
      width: 100%;
      margin-top: 10px;
    }
    
    .green { background-color: #27ae60; }
    .red { background-color: #e74c3c; }

    .history-item {
      background-color: var(--history-bg);
      padding: 10px;
      margin-bottom: 5px;
      border-radius: 5px;
      font-size: 14px;
    }
    .history-subtext {
      color: var(--subtext-color);
    }
  </style>
</head>
<body onload="initializeSettings()"> 
  <div class="container">
    
    <div class="header-row">
      <input type="text" id="stage-name" placeholder="Stage Name (e.g., Stage 1)">
      <button class="theme-btn" onclick="toggleTheme()">🌗</button>
    </div>

    <div class="boxHit">
      <label>A Hits:</label>
      <button onclick="adjustValue('a', -1)">-</button>
      <input type="number" id="a" value="0" inputmode="numeric" onfocus="this.select()" oninput="liveCalculate()">
      <button onclick="adjustValue('a', 1)">+</button>
    </div>
    
    <div class="boxHit">
      <label>B Hits:</label>
      <button onclick="adjustValue('b', -1)">-</button>
      <input type="number" id="b" value="0" inputmode="numeric" onfocus="this.select()" oninput="liveCalculate()">
      <button onclick="adjustValue('b', 1)">+</button>
    </div>

    <div class="boxHit">
      <label>C Hits:</label>
      <button onclick="adjustValue('c', -1)">-</button>
      <input type="number" id="c" value="0" inputmode="numeric" onfocus="this.select()" oninput="liveCalculate()">
      <button onclick="adjustValue('c', 1)">+</button>
    </div>

    <div class="boxHit">
      <label>D Hits:</label>
      <button onclick="adjustValue('d', -1)">-</button>
      <input type="number" id="d" value="0" inputmode="numeric" onfocus="this.select()" oninput="liveCalculate()">
      <button onclick="adjustValue('d', 1)">+</button>
    </div>

    <div class="boxHit">
      <label>M Hits:</label>
      <button onclick="adjustValue('m', -1)">-</button>
      <input type="number" id="m" value="0" inputmode="numeric" onfocus="this.select()" oninput="liveCalculate()">
      <button onclick="adjustValue('m', 1)">+</button>
    </div>

    <div class="boxHit">
      <label>NS Hits:</label>
      <button onclick="adjustValue('ns', -1)">-</button>
      <input type="number" id="ns" value="0" inputmode="numeric" onfocus="this.select()" oninput="liveCalculate()">
      <button onclick="adjustValue('ns', 1)">+</button>
    </div>

    <div style="margin-top: 15px;">
      <label style="display: block; margin-bottom: 5px;">Time (seconds):</label>
        <input type="tel" id="time" value="0.00" style="width: 100%; box-sizing: border-box;" oninput="formatTime(this)" onfocus="this.select()">
    </div>

    <div id="result"></div>
    <div id="status-message"></div>

    <button class="btnWide green" onclick="saveScore()">Save Score</button>
    <button class="btnWide red" onclick="resetApp()">Clear Inputs</button>
    
    <button class="btnWide" style="background-color: #7f8c8d;" onclick="toggleHistory()">Toggle History</button>

    <div id="history-section" style="display: none; margin-top: 20px; text-align: left;">
      <h3>Past Stages</h3>
      <ul id="history-list" style="list-style: none; padding: 0;"></ul>
      
      <button class="btnWide green" onclick="exportHistory()" style="margin-bottom: 10px;">📋 Copy to Clipboard</button>
      <button class="btnWide red" onclick="clearHistory()">Clear History</button>
    </div>

  </div>

  <script>
    let historyData = JSON.parse(localStorage.getItem('stageHistory')) || [];

    function initializeSettings() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
      }
      liveCalculate();
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark');
      } else {
        localStorage.setItem('theme', 'light');
      }
    }

    function formatTime(input) {
      let digits = input.value.replace(/\D/g, '');
      let num = parseInt(digits || '0', 10) / 100;
      input.value = num.toFixed(2);
      liveCalculate();
    }

    function adjustValue(inputId, increment) {
      let el = document.getElementById(inputId);
      let value = parseInt(el.value, 10);
      if (isNaN(value)) value = 0;
      let newValue = Math.max(0, value + increment);
      el.value = newValue;
      liveCalculate(); 
    }

    function liveCalculate() {
      const getValue = (id) => parseFloat(document.getElementById(id).value) || 0;
      
      let a = getValue("a"), b = getValue("b"), c = getValue("c"), 
          d = getValue("d"), m = getValue("m"), ns = getValue("ns"), 
          time = getValue("time");

      let totalPoints = (a * 5) + (b * 5) + (c * 3) + (d * 1) - (m * 10) - (ns * 10);

      if (time <= 0) {
        document.getElementById("result").innerHTML = `
          Hit Factor: <span style="color: #ccc;">0.0000</span><br>
          <span class="history-subtext" style="font-size: 16px; font-weight: normal;">
            ${totalPoints} pts | 0.00s
          </span>
        `;
        return;
      }

      let hitFactor = (totalPoints / time).toFixed(4);
      if (hitFactor < 0) hitFactor = "0.0000";

      document.getElementById("result").innerHTML = `
        Hit Factor: <span style="color: #27ae60;">${hitFactor}</span><br>
        <span class="history-subtext" style="font-size: 16px; font-weight: normal;">
          ${totalPoints} pts | ${time.toFixed(2)}s
        </span>
      `;
    }

    function saveScore() {
      const getValue = (id) => parseFloat(document.getElementById(id).value) || 0;
      let time = getValue("time");
      let statusDiv = document.getElementById("status-message");

      if (time <= 0) {
        statusDiv.style.color = "#e74c3c";
        statusDiv.textContent = "Time must be > 0 to save.";
        setTimeout(() => statusDiv.textContent = "", 3000);
        return;
      }

      let stageName = document.getElementById("stage-name").value.trim() || "Unnamed Stage";

      let a = getValue("a"), b = getValue("b"), c = getValue("c"), 
          d = getValue("d"), m = getValue("m"), ns = getValue("ns");
      let totalPoints = (a * 5) + (b * 5) + (c * 3) + (d * 1) - (m * 10) - (ns * 10);
      let hitFactor = (totalPoints / time).toFixed(4);
      if (hitFactor < 0) hitFactor = "0.0000";

      const entry = {
        name: stageName,
        date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        hf: hitFactor,
        points: totalPoints,
        time: time.toFixed(2)
      };
      
      historyData.unshift(entry);
      if(historyData.length > 10) historyData.pop();
      localStorage.setItem('stageHistory', JSON.stringify(historyData));
      
      if(document.getElementById("history-section").style.display === "block") {
          renderHistory();
      }

      statusDiv.style.color = "#27ae60";
      statusDiv.textContent = "Score Saved to History!";
      setTimeout(() => statusDiv.textContent = "", 3000);
    }

    function renderHistory() {
      const list = document.getElementById("history-list");
      list.innerHTML = historyData.map(item => `
        <li class="history-item">
          <strong>${item.name}</strong> <span style="font-size: 12px; color: #888;">(${item.date})</span><br>
          HF: <span style="color: #27ae60; font-weight: bold; font-size: 16px;">${item.hf}</span> — <span class="history-subtext">${item.points} pts in ${item.time}s</span>
        </li>
      `).join('');
    }

    function toggleHistory() {
      const section = document.getElementById("history-section");
      section.style.display = section.style.display === "none" ? "block" : "none";
      renderHistory();
    }

    function clearHistory() {
      if(confirm("Delete all history?")) {
        historyData = [];
        localStorage.removeItem('stageHistory');
        renderHistory();
      }
    }

    function exportHistory() {
      let statusDiv = document.getElementById("status-message");

      if (historyData.length === 0) {
        statusDiv.style.color = "#e74c3c";
        statusDiv.textContent = "No history to export!";
        setTimeout(() => statusDiv.textContent = "", 3000);
        return;
      }

      let exportText = "SRA Stage Results:\n\n";
      historyData.forEach((item) => {
        exportText += `*${item.name}* (${item.date})\n`;
        exportText += `Hit Factor: ${item.hf}\n`;
        exportText += `Score: ${item.points} pts in ${item.time}s\n\n`;
      });

      navigator.clipboard.writeText(exportText).then(() => {
        statusDiv.style.color = "#27ae60";
        statusDiv.textContent = "Copied to Clipboard!";
        setTimeout(() => statusDiv.textContent = "", 3000);
      }).catch(err => {
        statusDiv.style.color = "#e74c3c";
        statusDiv.textContent = "Failed to copy text.";
        setTimeout(() => statusDiv.textContent = "", 3000);
        console.error('Could not copy text: ', err);
      });
    }

    function resetApp() {
      ["a", "b", "c", "d", "m", "ns"].forEach(id => document.getElementById(id).value = "0");
      document.getElementById("time").value = "0.00";
      document.getElementById("status-message").textContent = "";
      liveCalculate(); 
    }
  </script>

</body>
</html>
