<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>STAGE CALC</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stage Calc">
  
  <link rel="apple-touch-icon" href="https://via.placeholder.com/180">

  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      /* Prevents text selection while tapping buttons quickly */
      user-select: none; 
      -webkit-user-select: none;
    }

    .container {
      width: 90vw; /* Slightly wider for mobile screens */
      margin: 20px auto;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      background-color: #fff;
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
    }

    /* Improved touch targets for mobile */
    input[type="number"] {
      width: 80px;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 18px; /* 16px+ prevents iOS auto-zoom on focus */
      text-align: center;
    }

    button {
      width: 50px;
      padding: 15px;
      border-radius: 6px;
      border: none;
      background-color: #3498db;
      color: white;
      font-size: 18px;
      cursor: pointer;
      touch-action: manipulation; /* Optimizes for fast tapping */
    }

    button:active {
      background-color: #2980b9;
      transform: scale(0.95);
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #2c3e50;
    }

    #input-error {
      color: red;
      margin-top: 10px;
      font-weight: bold;
    }

    .boxHit {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      flex-grow: 1;
      text-align: left;
    }

    .btnWide {
      width: 100%; /* Full width buttons look better on mobile */
      margin-top: 10px;
    }
    .green { background-color: #27ae60; }
    .red { background-color: #e74c3c; }

  </style>
</head>
<body>

  <div class="container">
    <h1>STAGE CALC</h1>

    <div class="boxHit">
      <label>A Hits:</label>
      <button onclick="adjustValue('a', -1)">-</button>
      <input type="number" id="a" value="0" readonly>
      <button onclick="adjustValue('a', 1)">+</button>
    </div>
    
    <div class="boxHit">
      <label>B Hits:</label>
      <button onclick="adjustValue('b', -1)">-</button>
      <input type="number" id="b" value="0" readonly>
      <button onclick="adjustValue('b', 1)">+</button>
    </div>

    <div class="boxHit">
	    <label>C Hits:</label>
    	<button onclick="adjustValue('c', -1)">-</button>
    	<input type="number" id="c" value="0" readonly>
    	<button onclick="adjustValue('c', 1)">+</button>
    </div>

    <div class="boxHit">
    	<label>D Hits:</label>
    	<button onclick="adjustValue('d', -1)">-</button>
    	<input type="number" id="d" value="0" readonly>
    	<button onclick="adjustValue('d', 1)">+</button>
    </div>

    <div class="boxHit">
    	<label>M Hits:</label>
    	<button onclick="adjustValue('m', -1)">-</button>
    	<input type="number" id="m" value="0" readonly>
    	<button onclick="adjustValue('m', 1)">+</button>
    </div>

    <div class="boxHit">
    	<label>NS Hits:</label>
    	<button onclick="adjustValue('ns', -1)">-</button>
    	<input type="number" id="ns" value="0" readonly>
    	<button onclick="adjustValue('ns', 1)">+</button>
    </div>

    <div style="margin-top: 20px;">
    	<label style="display: block; margin-bottom: 5px;">Time (seconds):</label>
    	<input type="number" id="time" value="0" step="0.01" style="width: 100%; box-sizing: border-box;">
    </div>

    <button class="btnWide green" onclick="calculateHitFactor()">Calculate</button>
    <button class="btnWide red" onclick="resetApp()">Clear</button>
    
    <button class="btnWide" style="background-color: #7f8c8d;" onclick="toggleHistory()">View History</button>

    <div id="history-section" style="display: none; margin-top: 20px; text-align: left;">
      <h3>Past Stages</h3>
      <ul id="history-list" style="list-style: none; padding: 0;"></ul>
      <button class="btnWide red" onclick="clearHistory()">Clear All History</button>
    </div>

    <div id="result"></div>
    <div id="input-error" style="display: none;">Syntax Error. Please check inputs.</div>
  </div>

  <script>
    // Load history from phone storage on startup
let historyData = JSON.parse(localStorage.getItem('stageHistory')) || [];

function adjustValue(inputId, increment) {
  let el = document.getElementById(inputId);
  let value = parseFloat(el.value) || 0;
  let newValue = Math.max(0, value + increment);
  el.value = newValue;
}

function calculateHitFactor() {
  const getValue = (id) => parseFloat(document.getElementById(id).value) || 0;
  
  let a = getValue("a"), b = getValue("b"), c = getValue("c"), 
      d = getValue("d"), m = getValue("m"), ns = getValue("ns"), 
      time = getValue("time");

  if (time <= 0) {
    document.getElementById("input-error").style.display = "block";
    return;
  }

  let totalPoints = (a * 5) + (b * 5) + (c * 3) + (d * 1) - (m * 10) - (ns * 10);
  let hitFactor = (totalPoints / time).toFixed(4);
  if (hitFactor < 0) hitFactor = "0.0000";

  document.getElementById("result").textContent = "Hit Factor: " + hitFactor;
  document.getElementById("input-error").style.display = "none";

  // --- SAVE TO HISTORY ---
  const entry = {
    date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
    hf: hitFactor,
    points: totalPoints
  };
  
  historyData.unshift(entry); // Add to the top of the list
  if(historyData.length > 10) historyData.pop(); // Keep only last 10 entries
  localStorage.setItem('stageHistory', JSON.stringify(historyData));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById("history-list");
  list.innerHTML = historyData.map(item => `
    <li style="background: #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px;">
      <strong>${item.date}</strong> — HF: <span style="color: #27ae60;">${item.hf}</span> (${item.points} pts)
    </li>
  `).join('');
}

function toggleHistory() {
  const section = document.getElementById("history-section");
  section.style.display = section.style.display === "none" ? "block" : "none";
  renderHistory();
}

function clearHistory() {
  if(confirm("Delete all history?")) {
    historyData = [];
    localStorage.removeItem('stageHistory');
    renderHistory();
  }
}

function resetApp() {
  ["a", "b", "c", "d", "m", "ns", "time"].forEach(id => document.getElementById(id).value = "0");
  document.getElementById("result").textContent = "";
}
  </script>

</body>
</html>
